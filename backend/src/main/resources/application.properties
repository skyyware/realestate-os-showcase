spring.application.name=realestate-api
server.port=${PORT:8098}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/realestate}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

realestate.public-base-url=${REALESTATE_PUBLIC_BASE_URL:http://localhost:4200}
realestate.api-base-url=${REALESTATE_API_BASE_URL:http://localhost:8098}
realestate.security.jwt-secret=${REALESTATE_JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only}
realestate.identity.mode=${REALESTATE_IDENTITY_MODE:local}
realestate.identity.keycloak-issuer-uri=${REALESTATE_KEYCLOAK_ISSUER_URI:}
realestate.identity.keycloak-client-id=${REALESTATE_KEYCLOAK_CLIENT_ID:realestate-os}
realestate.mail.from=${REALESTATE_MAIL_FROM:no-reply@realestate.localhost}
realestate.mail.from-name=${REALESTATE_MAIL_FROM_NAME:Real Estate OS}
realestate.mail.enabled=${REALESTATE_MAIL_ENABLED:false}
realestate.document-storage.root-path=${REALESTATE_DOCUMENT_STORAGE_ROOT:${user.dir}/output/document-storage}
realestate.document-storage.max-file-size-bytes=${REALESTATE_DOCUMENT_STORAGE_MAX_FILE_SIZE_BYTES:26214400}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.protocol=${SPRING_MAIL_PROTOCOL:smtp}
spring.mail.default-encoding=${SPRING_MAIL_DEFAULT_ENCODING:UTF-8}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}

<aside class="sidebar">
  <div class="brand compact">
    <span class="brand-icon brand-logo" aria-hidden="true">
      <svg viewBox="0 0 48 48"><path d="M8 23 24 10l16 13"/><path d="M13 21v17h22V21"/><path d="M20 38V27h8v11"/></svg>
    </span>
    <div>
      <strong>RealEstate OS</strong>
    </div>
  </div>
  <nav>
    @for (item of navigation; track item.section) {
      <button type="button" [class.active]="activeSection === item.section" (click)="selectSection(item.section)">
        <span class="nav-icon">
          @switch (item.icon) {
            @case ('home') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h5v-5h4v5h5v-9.5"/></svg> }
            @case ('building') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V7.5A2.5 2.5 0 0 1 6.5 5h8A2.5 2.5 0 0 1 17 7.5V20"/><path d="M17 10h1.5A1.5 1.5 0 0 1 20 11.5V20"/><path d="M8 9h5M8 13h5M8 17h5"/></svg> }
            @case ('grid') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="M9 5v14M15 5v14M5 12h14"/></svg> }
            @case ('finance') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/><path d="M15 8.5a4 4 0 1 0 0 7M8 11h6M8 14h6"/></svg> }
            @case ('task') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 5h14v14H5z"/><path d="m8.5 12.5 2.2 2.2 4.8-5.2"/></svg> }
            @case ('document') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h4M10 12h5M10 16h5"/></svg> }
            @case ('activity') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h4M5 12h9M5 17h6"/><path d="M17 8.5v5l3 2"/></svg> }
            @case ('decision') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10v4H7z"/><path d="M5 8h14v12H5z"/><path d="m8.5 14 2 2 5-5"/></svg> }
            @case ('message') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v10H7l-3 3z"/><path d="M8 9h8M8 12h5"/></svg> }
            @case ('settings') { <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04-2 3.46-.06-.02a1.8 1.8 0 0 0-2.1.42 1.8 1.8 0 0 0-.48 1.02H9a1.8 1.8 0 0 0-.48-1.02 1.8 1.8 0 0 0-2.1-.42l-.06.02-2-3.46.04-.04A1.8 1.8 0 0 0 4.76 15 1.8 1.8 0 0 0 3.8 13.4L3.74 13v-2l.06-.4A1.8 1.8 0 0 0 4.76 9a1.8 1.8 0 0 0-.36-1.98l-.04-.04 2-3.46.06.02a1.8 1.8 0 0 0 2.1-.42A1.8 1.8 0 0 0 9 2.1h6a1.8 1.8 0 0 0 .48 1.02 1.8 1.8 0 0 0 2.1.42l.06-.02 2 3.46-.04.04A1.8 1.8 0 0 0 19.24 9a1.8 1.8 0 0 0 .96 1.6l.06.4v2l-.06.4a1.8 1.8 0 0 0-.8 1.6Z"/></svg> }
          }
        </span>
        {{ item.label }}
      </button>
    }
  </nav>
  <div class="sidebar-footer">
    <button class="logout-button" type="button" (click)="logout()">Logout</button>
  </div>
</aside>

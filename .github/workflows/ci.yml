name: Build RealEstate OS

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build and verify
        run: npm run ci

      - name: Upload application PDF
        uses: actions/upload-artifact@v7
        with:
          name: sascha-dobrochynskyy-dotega-bewerbung
          path: output/pdf/sascha-dobrochynskyy-dotega-bewerbung.pdf
